<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#001A33"/>
      <stop offset="55%" stop-color="#002244"/>
      <stop offset="100%" stop-color="#000814"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC20E" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFC20E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD75E"/>
      <stop offset="100%" stop-color="#E0A500"/>
    </radialGradient>
    <radialGradient id="nodeCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="100%" stop-color="#FFC20E"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="980" cy="320" rx="520" ry="420" fill="url(#goldGlow)"/>

  <!-- subtle grid dots -->
  <g fill="#FFC20E" opacity="0.05">
    <circle cx="120" cy="90" r="2"/><circle cx="220" cy="90" r="2"/><circle cx="120" cy="550" r="2"/>
    <circle cx="1160" cy="560" r="2"/><circle cx="1060" cy="100" r="2"/>
  </g>

  <!-- ===== Logo mark (right side) ===== -->
  <g transform="translate(900,320) scale(3.0)">
    <!-- connection paths -->
    <g stroke="#FFC20E" fill="none">
      <path d="M0 0 Q-10 -12 -22 -20" stroke-width="1.2" opacity="0.5"/>
      <path d="M0 0 Q12 -14 22 -22" stroke-width="1.2" opacity="0.5"/>
      <path d="M0 0 Q6 12 14 16" stroke-width="1.2" opacity="0.5"/>
      <path d="M0 0 Q-12 14 -18 20" stroke-width="1.2" opacity="0.5"/>
      <path d="M0 0 Q-14 -6 -26 0" stroke-width="0.9" opacity="0.32"/>
      <path d="M0 0 Q14 -6 26 0" stroke-width="0.9" opacity="0.32"/>
      <path d="M-22 -20 Q-18 -26 -10 -28" stroke-width="0.8" opacity="0.3"/>
      <path d="M22 -22 Q18 -28 10 -32" stroke-width="0.8" opacity="0.3"/>
    </g>
    <!-- glow -->
    <circle cx="0" cy="0" r="34" fill="url(#goldGlow)"/>
    <!-- nodes -->
    <circle cx="0" cy="0" r="4.2" fill="url(#nodeCore)" filter="url(#soft)"/>
    <circle cx="-22" cy="-20" r="3.6" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="22" cy="-22" r="4" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="14" cy="16" r="3.4" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="-18" cy="20" r="3" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="-26" cy="0" r="2.6" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="26" cy="0" r="2.6" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="-10" cy="-28" r="2.4" fill="url(#node)" opacity="0.85" filter="url(#soft)"/>
    <circle cx="10" cy="-32" r="2.4" fill="url(#node)" opacity="0.85" filter="url(#soft)"/>
  </g>

  <!-- ===== Text (left side) ===== -->
  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
    <text x="100" y="210" fill="#FFC20E" font-size="34" font-weight="700" letter-spacing="6">JD AI OS</text>
    <text x="100" y="300" fill="#FFFFFF" font-size="76" font-weight="800">The AI Operating</text>
    <text x="100" y="380" fill="#FFFFFF" font-size="76" font-weight="800">System for Your Life</text>
    <text x="100" y="452" fill="#FFFFFF" font-size="76" font-weight="800">&amp; Business</text>
    <text x="103" y="512" fill="#AFC4DC" font-size="27" font-weight="400">Turn any AI — Claude, ChatGPT, Gemini — into a chief-of-staff that knows you.</text>
  </g>

  <!-- footer brand bar -->
  <rect x="100" y="556" width="46" height="4" rx="2" fill="#FFC20E"/>
  <text x="160" y="563" fill="#7E97B3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="20" font-weight="600">jdproductions.io · Producing the future with AI</text>
</svg>
