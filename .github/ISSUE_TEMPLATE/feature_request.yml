name: "💡 Feature / idea"
description: Suggest an improvement or something you'd love to see.
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you like JD AI OS to do?
      placeholder: "It would be great if..."
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      placeholder: "Right now I have to... which means..."
  - type: dropdown
    id: tier
    attributes:
      label: Is this for the free starter or the full product?
      options:
        - Free starter
        - Full product (jdproductions.io)
        - Not sure
